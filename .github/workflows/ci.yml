# Cross-platform smoke checks (no full MSVC game build on Linux/macOS runners).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vulkan-tools:
    name: Vulkan probes (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: macos-latest
            cxx: clang++
          - os: windows-latest
            cxx: cl
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and run (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          CI: true
        run: |
          set -euo pipefail
          make -C tools/vulkan_caps clean all CXX="${{ matrix.cxx }}"
          make -C tools/vulkanrt_caps clean all CXX="${{ matrix.cxx }}"
          ./tools/vulkan_caps/vulkan_caps
          ./tools/vulkanrt_caps/vulkanrt_caps
          make -C tools/aiml3 clean all CXX="${{ matrix.cxx }}"
          printf 'HELLO\nquit\n' | ./tools/aiml3/aiml3 --load tools/aiml3/test/hello.json
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq glpk-utils
            make -C tools/ampl_mathprog gen
            test -f base/optim/resource_tuned.cfg
          fi

      - name: Build and run (Windows MSVC)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          CI: true
        run: |
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          if not exist "%VSWHERE%" (
            echo vswhere.exe not found
            exit /b 1
          )
          for /f "usebackq tokens=*" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo No Visual Studio installation with MSVC x64 tools found
            exit /b 1
          )
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat" >nul
          cd /d "%GITHUB_WORKSPACE%\tools\vulkan_caps"
          if exist vulkan_caps.exe del vulkan_caps.exe
          cl /nologo /EHsc /O2 /W3 /Fe:vulkan_caps.exe main.cpp
          if errorlevel 1 exit /b 1
          vulkan_caps.exe
          if errorlevel 1 exit /b 1
          cd /d "%GITHUB_WORKSPACE%\tools\vulkanrt_caps"
          if exist vulkanrt_caps.exe del vulkanrt_caps.exe
          cl /nologo /EHsc /O2 /W3 /Fe:vulkanrt_caps.exe main.cpp
          if errorlevel 1 exit /b 1
          vulkanrt_caps.exe
          if errorlevel 1 exit /b 1
          cd /d "%GITHUB_WORKSPACE%\tools\aiml3"
          if exist aiml3.exe del aiml3.exe
          cl /nologo /EHsc /O2 /W3 /Fe:aiml3.exe main.cpp normalize.cpp match.cpp template.cpp interpreter.cpp load_json.cpp load_xml.cpp
          if errorlevel 1 exit /b 1
          (echo HELLO& echo quit) | aiml3.exe --load test\hello.json
          if errorlevel 1 exit /b 1
