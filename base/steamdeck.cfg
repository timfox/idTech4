// Steam Deck / Linux joydev defaults (requires in_joydev + in_joy_buttons 1).
// Load with: exec steamdeck.cfg
// Tune axis indices with in_joy_axis* if sticks are wrong for your device.

// Face buttons (typical Xbox order on many SDL/Deck mappings — verify with +show_keys or bind menu)
bind "JOY1" "_attack"
bind "JOY2" "_impulse19"
bind "JOY3" "_impulse13"
bind "JOY4" "_zoom"

// Shoulders / menu-ish (adjust per jstest)
bind "JOY5" "_impulse14"
bind "JOY6" "_impulse15"
bind "JOY7" "_speed"
bind "JOY8" "_moveDown"

echo "steamdeck.cfg: joy binds applied (edit base/steamdeck.cfg if buttons map wrong)"
